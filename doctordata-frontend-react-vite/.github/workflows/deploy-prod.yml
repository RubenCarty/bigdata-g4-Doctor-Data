name: Deploy Prod

on:
  push:
    branches: [master]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/doctordata-frontend-react-vite

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

  build-push-image:
    needs: build
    runs-on: ubuntu-latest
    environment: PROD
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: prod
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          push: true
          tags: |
            ${{ env.IMAGE }}:prod
            ${{ env.IMAGE }}:prod-${{ github.sha }}

  deploy:
    needs: build-push-image
    runs-on: ubuntu-latest
    environment: PROD
    steps:
      - name: Reiniciar el servicio web en el servidor de PROD
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VULTR_SSH_HOST }}
          username: ${{ secrets.VULTR_SSH_USER }}
          key: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/doctordata
            docker compose -f docker-compose.prod.yml pull web
            docker compose -f docker-compose.prod.yml up -d --no-deps web
            docker image prune -f
