name: Deploy QA

on:
  push:
    branches: [qa]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/doctordata-backend-go

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  build-push-image:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: local
          push: true
          tags: |
            ${{ env.IMAGE }}:qa
            ${{ env.IMAGE }}:qa-${{ github.sha }}

  deploy:
    needs: build-push-image
    runs-on: ubuntu-latest
    environment: QA
    steps:
      - uses: actions/checkout@v4

      - name: Subir docker-compose.qa.yml y Caddyfile
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VULTR_SSH_HOST }}
          username: ${{ secrets.VULTR_SSH_USER }}
          key: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}
          source: "deploy/qa/docker-compose.qa.yml,deploy/qa/Caddyfile"
          target: "/opt/doctordata"
          strip_components: 2

      - name: Desplegar
        uses: appleboy/ssh-action@v1.2.0
        env:
          # Nombre a la izquierda = exactamente lo que docker-compose.qa.yml espera vía
          # ${VAR}; a la derecha, de donde sale realmente en GitHub (secreto o variable,
          # con o sin prefijo QA_ según cómo haya quedado cargado). Sin esto, Compose
          # sustituye cada ${VAR} por un string vacío — nada queda en un .env en el
          # servidor, se exportan directo en la sesión SSH.
          POSTGRES_DB: ${{ secrets.QA_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.QA_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.QA_POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.QA_JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.QA_ENCRYPTION_KEY }}
          SA_USER: ${{ secrets.QA_SA_USER }}
          SA_PASS: ${{ secrets.QA_SA_PASS }}
          CORS_ALLOWED_ORIGINS: ${{ vars.QA_CORS_ALLOWED_ORIGINS }}
          FRONTEND_BASE_URL: ${{ vars.QA_FRONTEND_BASE_URL }}
          BACKEND_BASE_URL: ${{ vars.QA_BACKEND_BASE_URL }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USERNAME: ${{ vars.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_NAME: ${{ vars.SMTP_FROM_NAME }}
          SMTP_FROM_ADDRESS: ${{ vars.SMTP_FROM_ADDRESS }}
          CONTACT_NOTIFY_EMAIL: ${{ vars.CONTACT_NOTIFY_EMAIL }}
          IZIPAY_SHOP_ID: ${{ vars.IZIPAY_SHOP_ID }}
          IZIPAY_CTX_MODE: ${{ vars.IZIPAY_CTX_MODE }}
          IZIPAY_TEST_PASSWORD: ${{ secrets.IZIPAY_TEST_PASSWORD }}
          IZIPAY_PRODUCTION_PASSWORD: ${{ secrets.IZIPAY_PRODUCTION_PASSWORD }}
          IZIPAY_TEST_PUBLIC_KEY: ${{ secrets.IZIPAY_TEST_PUBLIC_KEY }}
          IZIPAY_PRODUCTION_PUBLIC_KEY: ${{ secrets.IZIPAY_PRODUCTION_PUBLIC_KEY }}
          IZIPAY_TEST_HMAC_KEY: ${{ secrets.IZIPAY_TEST_HMAC_KEY }}
          IZIPAY_PRODUCTION_HMAC_KEY: ${{ secrets.IZIPAY_PRODUCTION_HMAC_KEY }}
        with:
          host: ${{ secrets.VULTR_SSH_HOST }}
          username: ${{ secrets.VULTR_SSH_USER }}
          key: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}
          envs: POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,JWT_SECRET,ENCRYPTION_KEY,SA_USER,SA_PASS,CORS_ALLOWED_ORIGINS,FRONTEND_BASE_URL,BACKEND_BASE_URL,SMTP_HOST,SMTP_PORT,SMTP_USERNAME,SMTP_PASSWORD,SMTP_FROM_NAME,SMTP_FROM_ADDRESS,CONTACT_NOTIFY_EMAIL,IZIPAY_SHOP_ID,IZIPAY_CTX_MODE,IZIPAY_TEST_PASSWORD,IZIPAY_PRODUCTION_PASSWORD,IZIPAY_TEST_PUBLIC_KEY,IZIPAY_PRODUCTION_PUBLIC_KEY,IZIPAY_TEST_HMAC_KEY,IZIPAY_PRODUCTION_HMAC_KEY
          script: |
            set -e
            mkdir -p /opt/doctordata
            cd /opt/doctordata
            docker compose -f docker-compose.qa.yml pull
            docker compose -f docker-compose.qa.yml up -d
            docker image prune -f
